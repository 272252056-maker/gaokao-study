<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1a1a2e" />
  <title>高中学习</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --surface-2: #242440;
      --text: #e8e6e3;
      --text-muted: #9a9690;
      --text-dim: #6b7280;
      --accent: #c9a96e;
      --accent-soft: rgba(201, 169, 110, 0.15);
      --primary: #6366f1;
      --primary-light: #818cf8;
      --border: rgba(255, 255, 255, 0.06);
      --success: #22c55e;
      --radius: 14px;
      --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body {
      font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }
    body { max-width: 480px; margin: 0 auto; padding-bottom: 24px; }
    .bg-glow {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 0%, rgba(201, 169, 110, 0.1) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 10% 90%, rgba(99, 102, 241, 0.06) 0%, transparent 55%);
    }
    .app { position: relative; z-index: 1; }
    .header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(15, 15, 26, 0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px 12px;
    }
    .header-row { display: flex; align-items: center; gap: 10px; }
    .back-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); width: 36px; height: 36px; border-radius: 10px;
      display: none; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
    }
    .back-btn.show { display: flex; }
    .back-btn:active { transform: scale(0.95); }
    .header-title { flex: 1; min-width: 0; }
    .header-title h1 { font-size: 1.15rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .header-title p { font-size: 0.75rem; color: var(--text-muted); margin-top: 2px; }
    .breadcrumb { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; font-size: 0.72rem; color: var(--text-dim); }
    .breadcrumb span { color: var(--accent); }
    .main { padding: 16px; }
    .section-label {
      font-size: 0.8rem; color: var(--text-muted); margin-bottom: 12px;
      display: flex; align-items: center; gap: 8px;
    }
    .section-label::before { content: ''; width: 3px; height: 14px; background: var(--accent); border-radius: 2px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 16px; cursor: pointer; transition: all 0.2s; box-shadow: var(--shadow);
    }
    .card:active { transform: scale(0.98); background: var(--surface-2); }
    .card.disabled { opacity: 0.45; cursor: default; }
    .card.disabled:active { transform: none; background: var(--surface); }
    .card-icon { font-size: 1.6rem; margin-bottom: 8px; }
    .card-title { font-size: 0.95rem; font-weight: 600; }
    .card-desc { font-size: 0.75rem; color: var(--text-muted); margin-top: 4px; }
    .card.full { grid-column: 1 / -1; }
    .view { display: none; }
    .view.active { display: block; animation: fadeIn 0.25s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
    .placeholder-box {
      text-align: center; padding: 48px 20px; color: var(--text-muted);
      background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius);
    }
    .placeholder-box .icon { font-size: 2.5rem; margin-bottom: 12px; }
    .placeholder-box p { font-size: 0.9rem; }
    .placeholder-box small { display: block; margin-top: 8px; font-size: 0.78rem; color: var(--text-dim); }
    /* 计划 */
    .plan-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .plan-form input, .plan-form select {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); padding: 11px 14px; font-size: 0.9rem; font-family: inherit;
    }
    .plan-form input:focus, .plan-form select:focus { outline: none; border-color: var(--accent); }
    .btn {
      background: linear-gradient(135deg, var(--accent), #a8864a);
      color: #1a1a2e; border: none; border-radius: 10px;
      padding: 11px 16px; font-size: 0.9rem; font-weight: 600; cursor: pointer;
    }
    .btn:active { transform: scale(0.98); opacity: 0.9; }
    .btn-secondary {
      background: var(--surface); color: var(--text); border: 1px solid var(--border);
    }
    .btn-row { display: flex; gap: 8px; margin-top: 12px; }
    .btn-row .btn { flex: 1; }
    .plan-list { display: flex; flex-direction: column; gap: 8px; }
    .plan-item {
      display: flex; align-items: flex-start; gap: 10px;
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px;
    }
    .plan-item.done { opacity: 0.55; }
    .plan-item.done .plan-text { text-decoration: line-through; }
    .plan-check {
      width: 22px; height: 22px; border-radius: 6px; border: 2px solid var(--border);
      flex-shrink: 0; cursor: pointer; margin-top: 2px;
    }
    .plan-check.checked { background: var(--success); border-color: var(--success); }
    .plan-body { flex: 1; min-width: 0; }
    .plan-text { font-size: 0.9rem; word-break: break-word; }
    .plan-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .tag { font-size: 0.68rem; padding: 2px 8px; border-radius: 6px; background: var(--accent-soft); color: var(--accent); }
    .plan-del { background: none; border: none; color: var(--text-dim); font-size: 1.2rem; cursor: pointer; padding: 0 4px; }
    /* 单词 */
    .word-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 14px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px; text-align: center; }
    .stat-num { font-size: 1.4rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.7rem; color: var(--text-muted); margin-top: 2px; }
    .word-list { display: flex; flex-direction: column; gap: 10px; }
    .word-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      overflow: hidden; box-shadow: var(--shadow);
    }
    .word-header {
      padding: 14px 16px; display: flex; justify-content: space-between; align-items: flex-start; cursor: pointer;
    }
    .word-index { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 4px; }
    .word-text { font-size: 1.1rem; font-weight: 700; }
    .word-phonetic { font-size: 0.78rem; color: var(--text-muted); font-style: italic; margin-top: 2px; }
    .word-meaning { font-size: 0.85rem; color: var(--text-muted); margin-top: 6px; }
    .tts-btn {
      background: var(--accent-soft); border: none; width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0;
    }
    .word-expand { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; }
    .word-card.open .word-expand { max-height: 120px; }
    .word-example-inline {
      margin-top: 10px; padding: 10px 12px; background: var(--bg); border-radius: 10px;
      border: 1px solid var(--border);
    }
    .word-example-inline .ex-label { font-size: 0.68rem; color: var(--accent); margin-bottom: 4px; }
    .word-example-inline .example-en { font-size: 0.84rem; font-style: italic; color: var(--text-muted); }
    .word-example-inline .example-zh { font-size: 0.78rem; color: var(--text-dim); margin-top: 4px; }
    .word-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .tts-btn.small { width: 30px; height: 30px; font-size: 0.75rem; }
    .wrong-item {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 14px; margin-bottom: 10px;
    }
    .wrong-item-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
    .wrong-item-title { font-weight: 600; font-size: 0.95rem; }
    .wrong-item-del { background: none; border: none; color: var(--text-dim); font-size: 1.1rem; cursor: pointer; }
    .wrong-meta { font-size: 0.78rem; color: var(--text-dim); margin-top: 8px; line-height: 1.5; }
    .wrong-meta .wrong-a { color: #f87171; }
    .wrong-meta .right-a { color: var(--success); }
    .word-expand-inner { padding: 0 16px 14px; border-top: 1px solid var(--border); margin-top: 0; padding-top: 12px; }
    .example-en { font-size: 0.85rem; font-style: italic; margin-bottom: 4px; }
    .example-zh { font-size: 0.8rem; color: var(--text-muted); }
    /* 测试 */
    .quiz-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; }
    .quiz-progress { font-size: 0.78rem; color: var(--text-muted); margin-bottom: 16px; }
    .quiz-meaning { font-size: 1.2rem; font-weight: 600; margin-bottom: 20px; }
    .quiz-options { display: flex; flex-direction: column; gap: 8px; }
    .quiz-opt {
      background: var(--bg); border: 1px solid var(--border); border-radius: 10px;
      padding: 12px; font-size: 0.9rem; cursor: pointer; text-align: left;
      color: var(--text-muted);
    }
    .quiz-opt.correct { border-color: var(--success); background: rgba(34, 197, 94, 0.1); color: var(--success); }
    .quiz-opt.wrong { border-color: #ef4444; background: rgba(239, 68, 68, 0.1); color: #f87171; }
    .quiz-result { padding: 24px; text-align: center; }
    .quiz-score { font-size: 2.5rem; font-weight: 700; color: var(--accent); }
    .toast {
      position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--surface); color: var(--text); padding: 10px 20px; border-radius: 24px;
      font-size: 0.85rem; border: 1px solid var(--border); opacity: 0; pointer-events: none;
      transition: all 0.3s; z-index: 1000; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    .search-box {
      background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text); padding: 11px 14px; font-size: 0.9rem; width: 100%; margin-bottom: 12px; font-family: inherit;
    }
    .search-box:focus { outline: none; border-color: var(--accent); }
    .loading-box { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 0.9rem; }
    .grammar-list { display: flex; flex-direction: column; gap: 10px; }
    .grammar-cat {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden;
    }
    .grammar-cat-header {
      padding: 14px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer;
    }
    .grammar-cat-header .icon { font-size: 1.3rem; }
    .grammar-cat-header .title { font-weight: 600; flex: 1; }
    .grammar-cat-header .count { font-size: 0.75rem; color: var(--text-dim); }
    .grammar-topics { display: none; border-top: 1px solid var(--border); }
    .grammar-cat.open .grammar-topics { display: block; }
    .grammar-topic {
      padding: 12px 16px 12px 44px; border-top: 1px solid var(--border); cursor: pointer; font-size: 0.88rem;
    }
    .grammar-topic:first-child { border-top: none; }
    .grammar-topic:active { background: var(--surface-2); }
    .grammar-detail { display: flex; flex-direction: column; gap: 14px; }
    .grammar-block {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px;
    }
    .grammar-block h3 { font-size: 0.78rem; color: var(--accent); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.05em; }
    .grammar-block p, .grammar-block li { font-size: 0.88rem; color: var(--text-muted); }
    .grammar-block ul { padding-left: 18px; }
    .grammar-block li { margin-bottom: 4px; }
    .grammar-example { background: var(--bg); border-radius: 10px; padding: 10px 12px; margin-top: 8px; }
    .grammar-example .en { font-size: 0.88rem; font-style: italic; }
    .grammar-example .zh { font-size: 0.8rem; color: var(--text-dim); margin-top: 4px; }
    .mode-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
    .mode-tab {
      flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text-muted); padding: 9px; font-size: 0.82rem; cursor: pointer; font-family: inherit;
    }
    .mode-tab.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); font-weight: 600; }
    .alpha-bar {
      display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px;
    }
    .alpha-btn {
      min-width: 32px; height: 32px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-muted); font-size: 0.78rem; cursor: pointer; font-family: inherit;
    }
    .alpha-btn.active { background: var(--accent); border-color: var(--accent); color: #1a1a2e; font-weight: 700; }
    .alpha-btn .cnt { display: block; font-size: 0.6rem; opacity: 0.7; line-height: 1; }
    .alpha-info { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 10px; }
    .quiz-hint { font-size: 0.78rem; color: var(--text-dim); margin-top: 12px; text-align: left; }
    .quiz-tag { display: inline-block; font-size: 0.68rem; padding: 2px 8px; border-radius: 6px; background: var(--accent-soft); color: var(--accent); margin-bottom: 10px; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <div class="app">
    <header class="header">
      <div class="header-row">
        <button class="back-btn" id="backBtn" aria-label="返回">←</button>
        <div class="header-title">
          <h1 id="pageTitle">高中学习</h1>
          <p id="pageSubtitle">选择年级，开始今日学习</p>
        </div>
      </div>
      <div class="breadcrumb" id="breadcrumb"></div>
    </header>

    <!-- 首页：年级选择 -->
    <div class="view active" id="view-home">
      <div class="main">
        <div class="section-label">选择年级</div>
        <div class="grid-2" id="gradeGrid"></div>
      </div>
    </div>

    <!-- 年级模块 -->
    <div class="view" id="view-grade">
      <div class="main">
        <div class="section-label">学习模块</div>
        <div class="grid-2" id="moduleGrid"></div>
      </div>
    </div>

    <!-- 知识点：科目 -->
    <div class="view" id="view-subjects">
      <div class="main">
        <div class="section-label">选择科目</div>
        <div class="grid-3" id="subjectGrid"></div>
      </div>
    </div>

    <!-- 英语子模块 -->
    <div class="view" id="view-english">
      <div class="main">
        <div class="section-label">英语 · 知识点</div>
        <div class="grid-2" id="englishGrid"></div>
      </div>
    </div>

    <!-- 单词：随机30 -->
    <div class="view" id="view-words">
      <div class="main">
        <input type="search" class="search-box" id="wordSearch" placeholder="搜索单词或中文释义..." />
        <div class="mode-tabs">
          <button class="mode-tab active" data-word-mode="random" type="button">随机 30 词</button>
          <button class="mode-tab" data-word-mode="alpha" type="button">A-Z 浏览</button>
        </div>
        <div class="alpha-bar" id="alphaBar" hidden></div>
        <div class="alpha-info" id="alphaInfo" hidden></div>
        <div class="word-stats">
          <div class="stat-card"><div class="stat-num" id="wordCount">30</div><div class="stat-label">今日单词</div></div>
          <div class="stat-card"><div class="stat-num" id="bankCount">0</div><div class="stat-label">词库总量</div></div>
          <div class="stat-card"><div class="stat-num" id="learnedCount">0</div><div class="stat-label">已学习</div></div>
        </div>
        <div class="word-list" id="wordList"></div>
        <div class="btn-row">
          <button class="btn" id="shuffleWords">🔄 换一批</button>
          <button class="btn btn-secondary" id="hideMeanings">隐藏释义</button>
        </div>
      </div>
    </div>

    <!-- 语法 -->
    <div class="view" id="view-grammar">
      <div class="main">
        <div class="section-label">语法知识点 · 共 6 大类</div>
        <div class="grammar-list" id="grammarList"></div>
      </div>
    </div>

    <!-- 语法详情 -->
    <div class="view" id="view-grammar-detail">
      <div class="main">
        <div class="grammar-detail" id="grammarDetail"></div>
      </div>
    </div>

    <!-- 其他科目占位 -->
    <div class="view" id="view-subject-placeholder">
      <div class="main">
        <div class="placeholder-box">
          <div class="icon">📖</div>
          <p id="placeholderSubject">科目</p>
          <small>知识点整理功能即将上线</small>
        </div>
      </div>
    </div>

    <!-- 计划 -->
    <div class="view" id="view-plan">
      <div class="main">
        <div class="plan-form">
          <input type="text" id="planInput" placeholder="添加学习任务，如：复习数学第三章" maxlength="100" />
          <select id="planSubject">
            <option value="">选择科目（可选）</option>
          </select>
          <button class="btn" id="addPlanBtn">添加计划</button>
        </div>
        <div class="section-label">本周计划 · <span id="planStats">0 项待完成</span></div>
        <div class="plan-list" id="planList"></div>
      </div>
    </div>

    <!-- 测试 -->
    <div class="view" id="view-test">
      <div class="main">
        <div class="section-label">选择测试</div>
        <div class="grid-2">
          <div class="card" data-action="startQuiz">
            <div class="card-icon">🎯</div>
            <div class="card-title">单词测验</div>
            <div class="card-desc">随机10题，四选一</div>
          </div>
          <div class="card" data-action="startGrammarQuiz">
            <div class="card-icon">📖</div>
            <div class="card-title">语法测验</div>
            <div class="card-desc">10题，四选一</div>
          </div>
          <div class="card" data-action="openWrongBook">
            <div class="card-icon">📕</div>
            <div class="card-title">错题库</div>
            <div class="card-desc"><span id="wrongBookCount">0</span> 道待复习</div>
          </div>
          <div class="card disabled">
            <div class="card-icon">📋</div>
            <div class="card-title">综合测试</div>
            <div class="card-desc">即将上线</div>
          </div>
        </div>
      </div>
    </div>

    <!-- 单词测验 -->
    <div class="view" id="view-quiz">
      <div class="main">
        <div class="quiz-card" id="quizArea"></div>
      </div>
    </div>

    <!-- 错题库 -->
    <div class="view" id="view-wrong-book">
      <div class="main">
        <div class="section-label">错题库 · <span id="wrongListCount">0</span> 道</div>
        <div class="btn-row" style="margin-top:0;margin-bottom:14px">
          <button class="btn" id="reviewWrongBtn" type="button">复习错题</button>
          <button class="btn btn-secondary" id="clearWrongBtn" type="button">清空</button>
        </div>
        <div id="wrongList"></div>
      </div>
    </div>

    <!-- 年级占位 -->
    <div class="view" id="view-coming">
      <div class="main">
        <div class="placeholder-box">
          <div class="icon">🚧</div>
          <p id="comingGrade">高二</p>
          <small>该年级内容即将上线，请先使用高一模块</small>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="words-data.js"></script>
  <script src="grammar.js"></script>
  <script src="app.js"></script>
</body>
</html>
